name: sahayak
description: Cognitive companion for mild cognitive impairment
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP
  http: ^1.2.0
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  # Audio
  record: ^5.1.0
  audioplayers: ^6.0.0
  flutter_sound: ^9.2.13
  permission_handler: ^11.3.0
  # Camera
  camera: ^0.10.5
  image_picker: ^1.0.7
  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # UI
  flutter_riverpod: ^2.5.0
  go_router: ^13.2.0
  google_fonts: ^6.1.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  # Utils
  path_provider: ^2.1.2
  uuid: ^4.3.3
  intl: ^0.19.0
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
